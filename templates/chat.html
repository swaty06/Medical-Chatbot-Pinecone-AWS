<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}"/>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --header-bg: #1a3c5e;
            --header-text: #ffffff;
            --user-bubble: #1a3c5e;
            --user-text: #ffffff;
            --bot-bubble: #e8f0fe;
            --bot-text: #1a3c5e;
            --accent: #2e7df7;
            --muted: #8a9bb0;
            --border: #dde3ea;
            --send-btn: #2e7df7;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 720px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(26, 60, 94, 0.12);
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: var(--header-bg);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .chat-header img {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            object-fit: cover;
        }

        .chat-header .status-dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            border: 2px solid var(--header-bg);
            margin-left: -16px;
            margin-top: 28px;
            flex-shrink: 0;
        }

        .header-info { flex: 1; }

        .header-info .name {
            font-family: 'DM Serif Display', serif;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 0.2px;
        }

        .header-info .sub {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.65);
            margin-top: 1px;
        }

        /* Messages area */
        .msg-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg);
        }

        .msg-body::-webkit-scrollbar { width: 4px; }
        .msg-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* Bubbles */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: fadeUp 0.25s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .msg-row.user { flex-direction: row-reverse; }

        .msg-row img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .bubble {
            max-width: 68%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.55;
            position: relative;
        }

        .user .bubble {
            background: var(--user-bubble);
            color: var(--user-text);
            border-bottom-right-radius: 4px;
        }

        .bot .bubble {
            background: var(--bot-bubble);
            color: var(--bot-text);
            border-bottom-left-radius: 4px;
        }

        .msg-time {
            font-size: 0.68rem;
            color: var(--muted);
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        .user .msg-time { text-align: right; }
        .bot  .msg-time { text-align: left; }

        /* Typing indicator */
        .typing-indicator {
            display: none;
            align-items: flex-end;
            gap: 10px;
        }

        .typing-indicator img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
        }

        .typing-dots {
            background: var(--bot-bubble);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            padding: 12px 16px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--muted);
            border-radius: 50%;
            animation: bounce 1.2s infinite ease-in-out;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%            { transform: translateY(-6px); }
        }

        /* Footer / input */
        .chat-footer {
            padding: 16px 20px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .input-row {
            display: flex;
            align-items: center;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 50px;
            padding: 6px 6px 6px 18px;
            transition: border-color 0.2s;
        }

        .input-row:focus-within { border-color: var(--accent); }

        .input-row input {
            flex: 1;
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            color: #1a3c5e;
            outline: none;
        }

        .input-row input::placeholder { color: var(--muted); }

        .send-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--send-btn);
            border: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover  { background: #1a6de8; }
        .send-btn:active { transform: scale(0.93); }

        /* Welcome message */
        .welcome {
            text-align: center;
            padding: 20px 0 8px;
            color: var(--muted);
            font-size: 0.82rem;
        }

        .welcome strong {
            display: block;
            font-family: 'DM Serif Display', serif;
            font-size: 1.05rem;
            color: #1a3c5e;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="chat-wrapper">

    <!-- Header -->
    <div class="chat-header">
        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Bot">
        <span class="status-dot"></span>
        <div class="header-info">
            <div class="name">Medical Chatbot</div>
            <div class="sub">Ask me anything about your health</div>
        </div>
    </div>

    <!-- Messages -->
    <div class="msg-body" id="messageArea">
        <div class="welcome">
            <strong>Hello! I'm your Medical Assistant 🩺</strong>
            Ask me any medical question and I'll do my best to help.
        </div>
    </div>

    <!-- Typing indicator -->
    <div class="typing-indicator" id="typingIndicator" style="padding: 0 20px 12px; display:none;">
        <img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Bot">
        <div class="typing-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Input -->
    <div class="chat-footer">
        <form id="chatForm">
            <div class="input-row">
                <input
                    type="text"
                    id="userInput"
                    name="msg"
                    placeholder="Type your message..."
                    autocomplete="off"
                    required
                />
                <button type="submit" class="send-btn">
                    <i class="fas fa-paper-plane" style="font-size:0.85rem;"></i>
                </button>
            </div>
        </form>
    </div>

</div>

<!-- Single jQuery + Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>

<script>
    const msgArea      = document.getElementById('messageArea');
    const chatForm     = document.getElementById('chatForm');
    const userInput    = document.getElementById('userInput');
    const typingIndicator = document.getElementById('typingIndicator');

    function getTime() {
        const d = new Date();
        return d.getHours() + ':' + String(d.getMinutes()).padStart(2, '0');
    }

    function scrollBottom() {
        msgArea.scrollTop = msgArea.scrollHeight;
    }

    function appendMessage(text, sender) {
        const time  = getTime();
        const isUser = sender === 'user';
        const img   = isUser
            ? 'https://i.ibb.co/d5b84Xw/Untitled-design.png'
            : 'https://cdn-icons-png.flaticon.com/512/387/387569.png';

        const row = document.createElement('div');
        row.className = `msg-row ${sender}`;
        row.innerHTML = `
            <img src="${img}" alt="${sender}">
            <div>
                <div class="bubble">${text}</div>
                <span class="msg-time">${time}</span>
            </div>
        `;
        msgArea.appendChild(row);
        scrollBottom();
    }

    chatForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const msg = userInput.value.trim();
        if (!msg) return;

        appendMessage(msg, 'user');
        userInput.value = '';

        // Show typing indicator
        typingIndicator.style.display = 'flex';
        scrollBottom();

        $.ajax({
            url: '/get',
            type: 'POST',
            data: { msg: msg },
            success: function(data) {
                typingIndicator.style.display = 'none';
                appendMessage(data, 'bot');
            },
            error: function() {
                typingIndicator.style.display = 'none';
                appendMessage('Sorry, something went wrong. Please try again.', 'bot');
            }
        });
    });
</script>

</body>
</html>
